<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Care Pro - Clinical Edition</title>
    <style>
        :root {
            --bg-color: #f0f4f8; --card-bg: #ffffff; --text-main: #102a43;
            --text-secondary: #486581; --accent-blue: #0f609b; --accent-teal: #048274;
            --danger: #d90429; --warning: #f59e0b; --border-radius: 12px;
        }
        [data-theme="dark"] {
            --bg-color: #102a43; --card-bg: #243b53; --text-main: #f0f4f8;
            --text-secondary: #bcccdc; --accent-blue: #4aa9ec; --accent-teal: #2cb1bc;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; padding-bottom: 50px; }
        .header { background-color: var(--card-bg); padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--accent-blue); }
        .site-title { font-size: 26px; font-weight: 900; margin: 0; color: var(--accent-blue); }
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        
        .product-card { background-color: var(--card-bg); border-radius: var(--border-radius); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
        .product-header { padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 20px; }
        .img-placeholder { width: 90px; height: 90px; background-color: #e2e8f0; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #64748b; text-align: center; border: 1px dashed #cbd5e1; flex-shrink: 0; }
        [data-theme="dark"] .img-placeholder { background-color: #334e68; border-color: #486581; color: #9fb3c8; }
        .header-info { flex-grow: 1; }
        .brand-name { font-size: 12px; font-weight: bold; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .product-name { font-size: 20px; font-weight: 800; color: var(--accent-blue); margin: 5px 0; }
        
        .section-title { font-size: 16px; font-weight: bold; color: var(--accent-teal); margin: 15px 0 10px 0; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background-color: var(--accent-teal); border-radius: 2px; }
        
        .content-box { padding: 0 20px 20px 20px; }
        .data-grid { display: grid; grid-template-columns: 1fr; gap: 10px; font-size: 14px; line-height: 1.6; }
        .data-row { background-color: rgba(0,0,0,0.02); padding: 10px 15px; border-radius: 8px; }
        [data-theme="dark"] .data-row { background-color: rgba(255,255,255,0.03); }
        .data-label { font-weight: bold; color: var(--text-main); display: block; margin-bottom: 4px; }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .tag-safe { background-color: rgba(4,130,116,0.1); color: var(--accent-teal); padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; border: 1px solid var(--accent-teal); }
        .tag-danger { background-color: rgba(217,4,41,0.1); color: var(--danger); padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; border: 1px solid var(--danger); }
        
        .controls { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 8px; background-color: var(--accent-blue); color: #ffffff; font-weight: bold; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="site-title">Skin Care Pro <span style="font-size:14px; color:var(--text-secondary);">| Clinical Edition</span></h1>
    </div>
    <div class="controls">
        <button onclick="toggleTheme()">🌓 الوضع الليلي</button>
    </div>
    
    <div class="container" id="app">
        </div>

    <script src="data.js"></script>
    <script>
        function toggleTheme() {
            const r = document.documentElement;
            r.getAttribute('data-theme') === 'dark' ? r.removeAttribute('data-theme') : r.setAttribute('data-theme', 'dark');
        }

        function renderProducts() {
            const app = document.getElementById('app');
            let html = '';
            
            deepProductsList.forEach(p => {
                // معالجة مكان الصورة (الخانة محجوزة للمستقبل)
                let imageElement = p.image ? `<img src="${p.image}" style="width:90px; height:90px; object-fit:contain; border-radius:8px;">` : `<div class="img-placeholder">صورة<br>المنتج</div>`;
                
                // معالجة التداخلات الدوائية
                let doNotMix = p.clinical_usage.layering.do_not_mix_with.map(item => `<span class="tag-danger">❌ ${item}</span>`).join('');
                let bestMix = p.clinical_usage.layering.best_mixed_with.map(item => `<span class="tag-safe">✅ ${item}</span>`).join('');

                html += `
                <div class="product-card">
                    <div class="product-header">
                        ${imageElement}
                        <div class="header-info">
                            <div class="brand-name">${p.brand}</div>
                            <div class="product-name">${p.name.ar}</div>
                            <div style="font-size:13px; color:var(--text-secondary);">${p.name.en}</div>
                        </div>
                    </div>
                    
                    <div class="content-box">
                        <div class="section-title">🧪 البطاقة الدوائية (Pharmacology)</div>
                        <div class="data-grid">
                            <div class="data-row"><span class="data-label">آلية العمل:</span> ${p.pharmacology.mechanism.ar}</div>
                            <div class="data-row"><span class="data-label">المواد الفعالة والتركيزات:</span> 
                                <ul style="margin:5px 0; padding-inline-start: 20px;">
                                    ${p.pharmacology.active_ingredients.map(ing => `<li><strong>${ing.name} (${ing.concentration}):</strong> ${ing.role.ar}</li>`).join('')}
                                </ul>
                            </div>
                            ${p.pharmacology.ph_level ? `<div class="data-row"><span class="data-label">مستوى الحموضة (pH):</span> ${p.pharmacology.ph_level}</div>` : ''}
                        </div>

                        <div class="section-title">🩺 الاستخدام السريري (Clinical Usage)</div>
                        <div class="data-grid">
                            <div class="data-row"><span class="data-label">الجرعة وطريقة التطبيق:</span> ${p.clinical_usage.application.ar}</div>
                            <div class="data-row"><span class="data-label">موقعه في الروتين:</span> ${p.clinical_usage.step_in_routine.ar}</div>
                            <div class="data-row">
                                <span class="data-label">قواعد الدمج (Layering):</span>
                                <div class="tags-container">${doNotMix} ${bestMix}</div>
                            </div>
                        </div>

                        <div class="section-title">⚠️ التحذيرات والفئة المستهدفة</div>
                        <div class="data-grid">
                            <div class="data-row">
                                <span class="data-label">الأمان:</span>
                                ${p.precautions.pregnancy_safe ? '<span class="tag-safe">🤰 آمن للحوامل</span>' : '<span class="tag-danger">⛔ يمنع للحوامل</span>'}
                                ${p.precautions.sun_sensitivity ? '<span class="tag-danger">☀️ يزيد التحسس للشمس (يجب واقي)</span>' : ''}
                            </div>
                            <div class="data-row"><span class="data-label">ملاحظات سريرية:</span> ${p.precautions.notes.ar}</div>
                        </div>
                    </div>
                </div>`;
            });
            app.innerHTML = html;
        }

        window.onload = renderProducts;
    </script>
</body>
</html>
