<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Care Pro</title>
    <style>
        :root {
            --bg-color: #f4f7f6; --card-bg: #ffffff; --text-main: #2d3748;
            --text-secondary: #718096; --accent-color: #3182ce; --safe-color: #38a169;
            --border-radius: 16px;
        }
        [data-theme="dark"] {
            --bg-color: #1a202c; --card-bg: #2d3748; --text-main: #f7fafc;
            --text-secondary: #a0aec0; --accent-color: #63b3ed; --safe-color: #68d391;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 40px 20px; transition: 0.4s ease;
        }
        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        button {
            padding: 12px 24px; cursor: pointer; border: none; border-radius: 8px;
            background-color: var(--accent-color); color: #ffffff; font-weight: bold;
            font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .products-grid { display: flex; flex-direction: column; gap: 20px; }
        .product-card {
            background-color: var(--card-bg); border-radius: var(--border-radius);
            padding: 25px; max-width: 500px; margin: 0 auto; width: 100%;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .brand { font-size: 14px; color: var(--accent-color); font-weight: 700; text-transform: uppercase; }
        .title { font-size: 24px; margin: 10px 0; font-weight: 800; }
        .desc { font-size: 16px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; }
        .ingredients-label { font-weight: bold; margin-bottom: 10px; display: block; }
        .ingredients-list { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .ingredient-btn {
            background-color: rgba(49,130,206,0.1); color: var(--accent-color);
            padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold;
            border: 1px solid var(--accent-color); cursor: pointer;
        }
        .tag {
            background-color: rgba(56,161,105,0.1); color: var(--safe-color);
            padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: bold;
            border: 1px solid var(--safe-color); display: inline-block;
        }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); display: none; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .modal-content {
            background-color: var(--card-bg); padding: 25px; border-radius: var(--border-radius);
            width: 85%; max-width: 400px;
        }
        .modal-title { font-size: 20px; font-weight: bold; color: var(--accent-color); margin-bottom: 10px; }
        .modal-body { font-size: 16px; line-height: 1.5; margin-bottom: 20px; }
        .close-btn { width: 100%; background-color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="toggleLanguage()">🌐 عربي / English</button>
        <button onclick="toggleTheme()">🌓 الوضع الليلي</button>
    </div>

    <div class="products-grid" id="app"></div>

    <div class="modal-overlay" id="ingredientModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
            <button class="close-btn" onclick="closeModal()">إغلاق / Close</button>
        </div>
    </div>

    <script src="data.js"></script>

    <script>
        let currentLang = 'ar';

        function renderUI() {
            const app = document.getElementById('app');
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            app.innerHTML = ''; // تفريغ الصفحة قبل وضع المنتجات باللغة الجديدة

            productsList.forEach(product => {
                const name = product.name[currentLang];
                const desc = product.description[currentLang];
                const ingredientsTitle = currentLang === 'ar' ? 'أهم المكونات (اضغط للتفاصيل):' : 'Key Ingredients (Tap for details):';
                const safeTag = currentLang === 'ar' ? '🤰 آمن للحوامل' : '🤰 Pregnancy Safe';

                let ingredientsHTML = '';
                product.key_ingredients.forEach(ingKey => {
                    if(ingredientsDictionary[ingKey]) {
                        const ingName = ingredientsDictionary[ingKey].name[currentLang];
                        ingredientsHTML += `<div class="ingredient-btn" onclick="openModal('${ingKey}')">${ingName}</div>`;
                    }
                });

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="brand">${product.brand}</div>
                    <div class="title">${name}</div>
                    <div class="desc">${desc}</div>
                    <div class="ingredients-label">${ingredientsTitle}</div>
                    <div class="ingredients-list">${ingredientsHTML}</div>
                    <div>${product.flags.pregnancy_safe ? `<div class="tag">${safeTag}</div>` : ''}</div>
                `;
                app.appendChild(card);
            });
        }

        function openModal(ingredientKey) {
            document.getElementById('modalTitle').innerText = ingredientsDictionary[ingredientKey].name[currentLang];
            document.getElementById('modalBody').innerText = ingredientsDictionary[ingredientKey].desc[currentLang];
            document.getElementById('ingredientModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('ingredientModal').style.display = 'none';
        }

        function toggleLanguage() { currentLang = currentLang === 'ar' ? 'en' : 'ar'; renderUI(); }
        function toggleTheme() {
            const root = document.documentElement;
            root.getAttribute('data-theme') === 'dark' ? root.removeAttribute('data-theme') : root.setAttribute('data-theme', 'dark');
        }

        renderUI();
    </script>
</body>
</html>
