<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkinCare Pro - Elite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="elite-navbar">
        <div class="logo-container">
            <h1 class="brand-logo">SkinCare <span class="gold-text">Pro</span></h1>
        </div>
        <div class="controls-container">
            <input type="text" id="productSearch" placeholder="🔍 ابحث عن منتج..." style="padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--accent-gold); outline: none; background: var(--bg-color); color: var(--text-main); font-family: 'Tajawal', sans-serif;">
            
            <button id="themeToggle" class="control-btn" title="تغيير الإضاءة">🌙</button>
            <button id="langToggle" class="control-btn" title="تغيير اللغة">EN</button>
        </div>
    </nav>

    <main class="main-container">
        <div class="sections-tabs">
            <button class="tab-btn active" data-target="products-section">المنتجات</button>
            <button class="tab-btn" data-target="routines-section">حالات البشرة والروتين</button>
            <button class="tab-btn" data-target="skin-types-section">أنواع البشرة</button>
        </div>

        <section id="products-section" class="content-section active">
            <div id="brandsGrid" class="brands-grid"></div>
            <div id="familiesGrid" class="families-grid" style="display: none;"></div>
            <div id="productsGrid" class="products-grid" style="display: none;"></div>
        </section>

        <section id="routines-section" class="content-section" style="display: none;">
            <h2 class="section-title">الأنظمة والروتين (قريباً)</h2>
        </section>

        <section id="skin-types-section" class="content-section" style="display: none;">
            <h2 class="section-title">أنواع البشرة (قريباً)</h2>
        </section>
    </main>

    <div id="productModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal-btn">&times;</button>
            <div id="productDetails" class="product-details-container"></div>
        </div>
    </div>

    <div id="glossaryModal" class="glossary-overlay">
        <div class="glossary-box">
            <button class="close-glossary-btn">&times;</button>
            <h3 id="glossaryTitle" class="glossary-title"></h3>
            <p id="glossaryDesc" class="glossary-desc"></p>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
