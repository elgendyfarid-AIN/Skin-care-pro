<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Skin Care Pro - Clinical</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #0f172a;
            --text-secondary: #64748b; --accent-blue: #2563eb; --accent-teal: #0d9488;
            --danger: #e11d48; --warning: #f59e0b; --border-radius: 12px;
        }
        [data-theme="dark"] {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9;
            --text-secondary: #94a3b8; --accent-blue: #60a5fa; --accent-teal: #2dd4bf;
        }
        body { 
            font-family: 'Cairo', sans-serif; background-color: var(--bg-color); 
            color: var(--text-main); margin: 0; transition: 0.3s; line-height: 1.6;
        }

        /* الهيدر */
        .top-bar { 
            background: var(--accent-blue); color: white; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .logo { font-weight: 700; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .nav-controls { display: flex; gap: 15px; align-items: center; }
        .control-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-size: 0.8rem; }

        /* البحث العالمي */
        .search-section { padding: 20px; background: var(--card-bg); margin-bottom: 10px; }
        #globalSearch { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; font-family: 'Cairo'; box-sizing: border-box; }

        /* الأقسام الرئيسية */
        .main-categories { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .cat-card { 
            background: var(--card-bg); padding: 25px 15px; border-radius: var(--border-radius);
            text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .cat-card:hover { transform: translateY(-3px); border-color: var(--accent-blue); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .cat-icon { width: 45px; height: 45px; fill: var(--accent-blue); }
        .cat-card span { font-weight: 700; font-size: 0.95rem; }

        /* كروت المنتجات */
        .product-card { background: var(--card-bg); margin: 15px; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); }
        .product-img { width: 100%; height: 200px; background: white; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .product-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-info { padding: 15px; }
        .badge { padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; margin-left: 5px; color: white; display: inline-block; margin-bottom: 5px; }

        /* القاموس */
        .glossary-term { color: var(--accent-blue); font-weight: 700; text-decoration: underline dotted; cursor: help; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 15px; width: 85%; max-width: 450px; position: relative; }
        .close-btn { position: absolute; top: 10px; left: 10px; font-size: 24px; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo" onclick="goHome()">🏥 Skin Care Pro</div>
        <div class="nav-controls">
            <button class="control-btn" onclick="toggleLanguage()" id="langBtn">EN</button>
            <button class="control-btn" onclick="toggleTheme()">🌓</button>
        </div>
    </div>

    <div id="homeView">
        <div class="search-section">
            <input type="text" id="globalSearch" placeholder="ابحث عن منتج، مادة فعالة، أو حالة..." onkeyup="handleGlobalSearch()">
        </div>
        
        <div class="main-categories" id="mainCats">
            <div class="cat-card" onclick="showBrands()">
                <svg class="cat-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2m-7 15h-2v-2h2v2m0-4h-2V7h2v7z"/></svg>
                <span id="txt-products">المنتجات الطبية</span>
            </div>
            <div class="cat-card" onclick="alert('قيد التجهيز')">
                <svg class="cat-icon" viewBox="0 0 24 24"><path d="M12 2c-4.42 0-8 3.58-8 8 0 1.57.46 3.03 1.24 4.26L3.01 21l6.74-2.23C10.63 19.54 12.09 20 13.66 20c4.42 0 8-3.58 8-8s-3.58-8-8-8z"/></svg>
                <span id="txt-conditions">الحالات الجلدية</span>
            </div>
            <div class="cat-card" onclick="alert('قيد التجهيز')">
                <svg class="cat-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                <span id="txt-skintypes">أنواع البشرة</span>
            </div>
            <div class="cat-card" onclick="alert('قيد التجهيز')">
                <svg class="cat-icon" viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2m-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1z"/></svg>
                <span id="txt-routine">بناء روتين</span>
            </div>
        </div>
    </div>

    <div id="brandsView" class="hidden">
        <div style="padding: 15px; font-weight: bold; color: var(--accent-blue);" onclick="goHome()">← العودة</div>
        <div id="brandsList" class="main-categories"></div>
    </div>

    <div id="resultsView" class="hidden">
        <div style="padding: 15px; font-weight: bold; color: var(--accent-blue);" onclick="goHome()">← العودة للرئيسية</div>
        <div id="resultsList"></div>
    </div>

    <div id="glossaryModal" class="modal" onclick="closeGlossary()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeGlossary()">&times;</span>
            <h3 id="glossaryTitle"></h3>
            <p id="glossaryBody"></p>
        </div>
    </div>

    <script src="data (6).js"></script>

    <script>
        let currentLang = 'ar';
        const uiText = {
            ar: { products: "المنتجات الطبية", conditions: "الحالات الجلدية", skintypes: "أنواع البشرة", routine: "بناء روتين", search: "ابحث عن منتج، مادة فعالة...", back: "العودة" },
            en: { products: "Clinical Products", conditions: "Skin Conditions", skintypes: "Skin Types", routine: "Routine Builder", search: "Search products, ingredients...", back: "Back" }
        };

        function goHome() {
            document.getElementById('homeView').classList.remove('hidden');
            document.getElementById('brandsView').classList.add('hidden');
            document.getElementById('resultsView').classList.add('hidden');
            document.getElementById('globalSearch').value = '';
        }

        function showBrands() {
            const list = document.getElementById('brandsList');
            list.innerHTML = '';
            // استخدام brandsList من ملف data (6).js
            window.brandsList.forEach(brand => {
                list.innerHTML += `
                    <div class="cat-card" onclick="showProductsByBrand('${brand.id}')">
                        <img src="${brand.logo || ''}" style="width:50px; height:50px; object-fit:contain;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/883/883044.png'">
                        <span>${brand.name}</span>
                    </div>`;
            });
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('brandsView').classList.remove('hidden');
        }

        function showProductsByBrand(brandId) {
            const products = window.deepProductsList.filter(p => p.brandId === brandId);
            renderResults(products);
        }

        function handleGlobalSearch() {
            const query = document.getElementById('globalSearch').value.toLowerCase();
            if (query.length < 2) return;
            
            const results = window.deepProductsList.filter(p => 
                p.name.ar.toLowerCase().includes(query) || 
                p.name.en.toLowerCase().includes(query) ||
                p.clinical_data.mechanism.ar.includes(query)
            );
            renderResults(results);
        }

        function renderResults(products) {
            const list = document.getElementById('resultsList');
            list.innerHTML = '';
            products.forEach(p => {
                list.innerHTML += `
                <div class="product-card">
                    <div class="product-img">
                        <img src="${p.image || 'https://via.placeholder.com/200x200?text=Skin+Care'}" alt="${p.name.en}">
                    </div>
                    <div class="product-info">
                        <h3 style="margin:0; color:var(--accent-blue)">${p.name[currentLang]}</h3>
                        <div style="margin: 10px 0;">
                            ${p.precautions.pregnancy_safe ? '<span class="badge" style="background:var(--accent-teal)">آمن للحامل</span>' : '<span class="badge" style="background:var(--danger)">غير آمن</span>'}
                        </div>
                        <p style="font-size:0.9rem; color:var(--text-secondary)">${p.clinical_data.mechanism[currentLang]}</p>
                    </div>
                </div>`;
            });
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('brandsView').classList.add('hidden');
            document.getElementById('resultsView').classList.remove('hidden');
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            document.getElementById('langBtn').innerText = currentLang === 'ar' ? 'EN' : 'AR';
            
            // تحديث نصوص الواجهة
            document.getElementById('txt-products').innerText = uiText[currentLang].products;
            document.getElementById('txt-conditions').innerText = uiText[currentLang].conditions;
            document.getElementById('txt-skintypes').innerText = uiText[currentLang].skintypes;
            document.getElementById('txt-routine').innerText = uiText[currentLang].routine;
            document.getElementById('globalSearch').placeholder = uiText[currentLang].search;
            
            goHome(); // إعادة تعيين الواجهة
        }

        function openGlossary(id) {
            const term = window.glossaryDict[id];
            if(term) {
                document.getElementById('glossaryTitle').innerText = term.title[currentLang];
                document.getElementById('glossaryBody').innerText = term.desc[currentLang];
                document.getElementById('glossaryModal').style.display = 'flex';
            }
        }
        function closeGlossary() { document.getElementById('glossaryModal').style.display = 'none'; }

        function toggleTheme() {
            const html = document.documentElement;
            html.getAttribute('data-theme') === 'dark' ? html.removeAttribute('data-theme') : html.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
